name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  setup_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org/"
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Extract version and npm tag from git tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"
            NPM_TAG="${PRERELEASE%%.*}"
            echo "NPM_TAG=$NPM_TAG" >> $GITHUB_ENV
          else
            echo "NPM_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Update package.json and WebTorrent client versions
        run: |
          export TAG=$VERSION
          node update-versions.js
        working-directory: ./scripts

      - name: Build
        run: pnpm run build

      - name: Override symlinks
        run: |
          for d in ./packages/*; do
              rm "$d"/README.md
              cp ./README.md "$d"
          done

      - name: Pack packages
        run: pnpm run pack-packages

      - name: Publish packages
        run: |
          pnpm publish --provenance --access public --tag ${{ env.NPM_TAG }} --no-git-checks --filter './packages/**'
