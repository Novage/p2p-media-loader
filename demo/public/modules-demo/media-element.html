<html>
  <head>
    <!-- Import Mediaelement CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/mediaelement@latest/build/mediaelementplayer.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/mediaelement-plugins@latest/dist/quality/quality.min.css"
    />

    <script type="importmap">
      {
        "imports": {
          "p2p-media-loader-core": "./core/p2p-media-loader-core.es.js",
          "p2p-media-loader-hlsjs": "./hlsjs/p2p-media-loader-hlsjs.es.js"
        }
      }
    </script>

    <!-- HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@~1/dist/hls.min.js"></script>

    <!-- Import Mediaelement JS -->
    <script src="https://cdn.jsdelivr.net/npm/mediaelement@latest/build/mediaelement-and-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mediaelement-plugins@latest/dist/quality/quality.min.js"></script>
  </head>

  <body>
    <!-- MediaElement HLS -->
    <div class="mejs_mediaelement">
      <video controls width="640px" height="480px" id="mediaelement"></video>
    </div>
    <script type="module">
      import { Engine as HlsEngine } from "p2p-media-loader-hlsjs";

      // Override global Hls.js class with P2P enabled mixin
      window.Hls = HlsEngine.injectP2PMixin(window.Hls);
      const hls = new window.Hls();

      hls.loadSource(
        "https://bitmovin-a.akamaihd.net/content/playhouse-vr/m3u8s/105560.m3u8",
      );
      hls.attachMedia(document.getElementById("mediaelement"));

      const player = new MediaElementPlayer("mediaelement", {
        iconSprite: "/modules-demo/mejs-controls.svg",
        features: [
          "playpause",
          "current",
          "progress",
          "duration",
          "volume",
          "fullscreen",
          "quality",
        ],
      });
    </script>
  </body>
</html>
