<html>
  <head>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/mediaelement@latest/build/mediaelementplayer.min.css"
    />
    <script type="importmap">
      {
        "imports": {
          "p2p-media-loader-core": "./core/p2p-media-loader-core.es.js",
          "p2p-media-loader-hlsjs": "./hlsjs/p2p-media-loader-hlsjs.es.js"
        }
      }
    </script>

    <!-- HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@~1/dist/hls.min.js"></script>

    <!-- Import Mediaelement JS -->
    <script src="https://cdn.jsdelivr.net/npm/mediaelement@latest/build/mediaelement-and-player.min.js"></script>
  </head>

  <body>
    <!-- MediaElement HLS -->
    <div class="mejs_mediaelement">
      <video controls width="640px" height="480px" id="mediaelement"></video>
    </div>
    <script type="module">
      import { Engine } from "p2p-media-loader-hlsjs";

      const engineMediaElement = new Engine();

      window.hls = new window.Hls(engineMediaElement.getHlsConfig());

      engineMediaElement.setHls(window.hls);
      window.hls.loadSource(
        "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
      );
      window.hls.attachMedia(document.getElementById("mediaelement"));

      var playerM = new MediaElementPlayer("mediaelement", {
        features: [
          "playpause",
          "progress",
          "current",
          "duration",
          "tracks",
          "volume",
          "fullscreen",
        ],
      });
    </script>
  </body>
</html>
