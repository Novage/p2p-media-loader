<html>
  <head>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/openplayerjs@latest/dist/openplayer.min.css"
    />
    <script type="importmap">
      {
        "imports": {
          "p2p-media-loader-core": "./core/p2p-media-loader-core.es.js",
          "p2p-media-loader-shaka": "./shaka/p2p-media-loader-shaka.es.js",
          "p2p-media-loader-hlsjs": "./hlsjs/p2p-media-loader-hlsjs.es.js"
        }
      }
    </script>

    <!-- HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@~1/dist/hls.min.js"></script>

    <!-- Import OpenPlayerJS -->
    <script src="https://cdn.jsdelivr.net/npm/openplayerjs@latest/dist/openplayer.min.js"></script>
  </head>

  <body>
    <!-- OpenPlayerJS -->
    <video
      id="openplayer"
      class="op-player op-player__media"
      controls
      playsinline
    ></video>
    <script type="module">
      import { Engine as HlsEngine } from "p2p-media-loader-hlsjs";

      window.Hls = HlsEngine.injectP2PMixin(window.Hls);
      const hls = new window.Hls();

      hls.loadSource(
        "https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8",
      );
      hls.attachMedia(document.getElementById("openplayer"));
      const openplayer = new OpenPlayerJS("openplayer", {
        startVolume: 0.5,
        controls: {
          layers: {
            left: ["play", "time", "volume"],
            middle: ["progress"],
            right: ["levels", "captions", "settings", "fullscreen"],
          },
        },
      });

      openplayer.init();
    </script>
  </body>
</html>
