<html>
  <head>
    <script type="importmap">
      {
        "imports": {
          "p2p-media-loader-core": "./core/p2p-media-loader-core.es.js",
          "p2p-media-loader-hlsjs": "./hlsjs/p2p-media-loader-hlsjs.es.js"
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/demo.css" />
    <!-- HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@~1/dist/hls.min.js"></script>

    <!-- Plyr -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js"></script>
  </head>

  <body>
    <!-- Plyr Hls -->
    <video
      width="1280px"
      height="720px"
      id="plyr"
      controls
      crossorigin
      playsinline
    ></video>

    <script type="module">
      import { Engine as HlsEngine } from "p2p-media-loader-hlsjs";

      window.Hls = HlsEngine.injectP2PMixin(window.Hls);
      const hls = new window.Hls();

      const playerPlyr = new Plyr("#plyr", {
        debug: false,
        controls: [
          "play",
          "progress",
          "current-time",
          "mute",
          "volume",
          "fullscreen",
          "settings",
        ],
      });

      hls.loadSource("https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8");
      hls.attachMedia(playerPlyr.media);
    </script>
  </body>
</html>
